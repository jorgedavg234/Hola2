<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti 💖</title>
<style>
    body {
        margin: 0;
        background: black;
        overflow: hidden;
    }
    canvas {
        display: block;
    }
    .texto {
        position: absolute;
        bottom: 20px;
        left: 20px;
        font-size: 16px;
        font-weight: bold;
        color: white;
        opacity: 0;
        transition: opacity 2s ease;
        font-family: Arial, sans-serif;
    }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="texto" id="mensaje">De Jorge para la niña más bonita 💖</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resizeCanvas();
window.addEventListener('resize', () => {
    resizeCanvas();
    startDrawing();
});

let angle = 0;
let i = 0;

function drawStep() {
    if (i >= 150) {
        document.getElementById("mensaje").style.opacity = 1;
        return;
    }

    let R = 1 - i * 0.0065;
    let G = 1 - i * 0.0065;
    let B = 0;

    ctx.strokeStyle = `rgb(${R*255}, ${G*255}, ${B*255})`;
    ctx.lineWidth = 2;

    // 🔥 SIEMPRE centrado EXACTO
    ctx.setTransform(1, 0, 0, 1, canvas.width / 2, canvas.height / 2);

    function move(radius, extent, turnLeft=true) {
        let steps = 30;
        let stepAngle = (extent * Math.PI / 180) / steps;

        let localAngle = angle;
        let x = 0;
        let y = 0;

        for (let j = 0; j < steps; j++) {
            let prevX = x;
            let prevY = y;

            localAngle += (turnLeft ? 1 : -1) * stepAngle;

            // 🔥 MÁS GRANDE
            x += Math.cos(localAngle) * radius * 0.02;
            y += Math.sin(localAngle) * radius * 0.02;

            ctx.beginPath();
            ctx.moveTo(prevX, prevY);
            ctx.lineTo(x, y);
            ctx.stroke();
        }
    }

    // 🔥 MÁS GRANDE PERO CONTROLADO
    let baseRadius = 130;

    move(baseRadius - i * 0.8, 50, true);
    angle += 80 * Math.PI / 180;
    move(baseRadius - i * 0.8, 50, true);
    angle -= 150 * Math.PI / 180;

    i++;
    requestAnimationFrame(drawStep);
}

function startDrawing() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    angle = 0;
    i = 0;
    document.getElementById("mensaje").style.opacity = 0;
    drawStep();
}

startDrawing();
</script>
</body>
</html>
