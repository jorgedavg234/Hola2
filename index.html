<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti 💖</title>
<style>
    body {
        margin: 0;
        background: black;
        overflow: hidden;
    }
    canvas {
        display: block;
    }
    .texto {
        position: absolute;
        bottom: 20px;
        left: 20px;
        font-size: 18px;
        font-weight: bold;
        color: white;
        opacity: 0;
        transition: opacity 2s ease;
        font-family: Arial, sans-serif;
    }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="texto" id="mensaje">De Jorge para la niña más bonita 💖</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas);

let x = canvas.width / 2;
let y = canvas.height / 2;
let angle = 0;
let i = 0;

function drawStep() {
    if (i >= 150) {
        document.getElementById("mensaje").style.opacity = 1;
        return;
    }

    let R = 1 - i * 0.0065;
    let G = 1 - i * 0.0065;
    let B = 0;

    ctx.strokeStyle = `rgb(${R*255}, ${G*255}, ${B*255})`;
    ctx.lineWidth = 2;

    function move(radius, extent, turnLeft=true) {
        let steps = 40;
        let stepAngle = (extent * Math.PI / 180) / steps;

        for (let j = 0; j < steps; j++) {
            let prevX = x;
            let prevY = y;

            angle += (turnLeft ? 1 : -1) * stepAngle;

            // 🔥 Aquí centramos mejor el dibujo
            x += Math.cos(angle) * radius * 0.015;
            y += Math.sin(angle) * radius * 0.015;

            ctx.beginPath();
            ctx.moveTo(prevX, prevY);
            ctx.lineTo(x, y);
            ctx.stroke();
        }
    }

    move(150 - i, 50, true);
    angle += 80 * Math.PI / 180;
    move(150 - i, 50, true);
    angle -= 150 * Math.PI / 180;

    i++;
    requestAnimationFrame(drawStep);
}

// 🔥 Reiniciar posición exactamente al centro antes de dibujar
function startDrawing() {
    x = canvas.width / 2;
    y = canvas.height / 2;
    angle = 0;
    i = 0;
    drawStep();
}

startDrawing();
</script>
</body>
</html>
